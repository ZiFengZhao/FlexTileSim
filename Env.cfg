#!/bin/bash
# NPU Simulator Environment Configuration
# Usage: source Env.cfg

export NPU_SIM_ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
export DRAMSIM3_HOME="$NPU_SIM_ROOT/external/DRAMsim3"
export NPU_LOG_DIR="$NPU_SIM_ROOT/log"
export LD_LIBRARY_PATH="$LD_LIBRARY_PATH:$DRAMSIM3_HOME"

echo "========================================"
echo "NPU Simulator Environment Setup"
echo "========================================"
echo "Project Root: $NPU_SIM_ROOT"
echo "DRAMSim3 Home: $DRAMSIM3_HOME"
echo "========================================"

mkdir -p "$NPU_LOG_DIR"